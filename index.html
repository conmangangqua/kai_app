<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Kai Hub - Zen Premium Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #475569;
      --primary-glow: rgba(71, 85, 105, 0.1);
      --secondary: #94a3b8;
      --bg-main: #ffffff;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --glass-border: #f1f5f9;
      --card-radius: 8px; /* Minimalist Zen */
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-main); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }
    header { padding: 100px 20px 40px; text-align: center; }
    header h1 { font-size: clamp(2.5rem, 8vw, 3.5rem); font-weight: 700; letter-spacing: -0.02em; color: var(--text-main); }
    .search-section { max-width: 480px; margin: 0 auto 50px; padding: 0 20px; position: sticky; top: 20px; z-index: 100; }
    .search-wrapper { position: relative; background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; }
    .search-wrapper input { width: 100%; background: transparent; border: none; padding: 16px 20px 16px 50px; color: var(--text-main); font-size: 0.95rem; font-weight: 500; outline: none; }
    .search-wrapper::before { content: '◎'; position: absolute; left: 20px; top: 50%; transform: translateY(-50%); font-size: 1.1rem; opacity: 0.4; }
    main { flex: 1; width: 100%; max-width: 1440px; margin: 0 auto; padding: 20px 40px 100px; }
    #appContainer { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .app-card { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: var(--card-radius); padding: 32px; display: flex; flex-direction: column; transition: all 0.4s ease; opacity: 0; transform: translateY(20px); animation: reveal 0.6s forwards; }
    .app-card:hover { border-color: var(--primary); transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0, 0, 0, 0.04); }
    .app-icon-box { width: 72px; height: 72px; margin-bottom: 24px; border-radius: var(--card-radius); background: #f8fafc; border: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .app-icon { width: 100%; height: 100%; object-fit: cover; filter: grayscale(10%); transition: 0.4s; }
    .app-card:hover .app-icon { filter: grayscale(0%); }
    .badge { font-size: 0.7rem; font-weight: 700; padding: 4px 10px; border-radius: 4px; text-transform: uppercase; margin-bottom: 20px; align-self: flex-start; background: #f1f5f9; color: var(--text-muted); }
    .app-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; color: var(--text-main); }
    .app-desc { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 30px; flex-grow: 1; font-weight: 400; line-height: 1.6; }
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn { padding: 14px 10px; border-radius: 6px; font-weight: 600; font-size: 0.85rem; text-decoration: none; text-align: center; border: 1px solid #e2e8f0; transition: 0.2s; }
    .btn-dev { background: #fff; color: var(--text-main); }
    .btn-live { background: var(--text-main); color: #fff; border-color: var(--text-main); }
    .btn-full { grid-column: span 2; background: #f8fafc; color: var(--text-muted); }
    .btn:hover { border-color: var(--primary); background: #f1f5f9; color: var(--primary); }
    .btn-live:hover { background: var(--primary); color: #fff; }
    footer { padding: 100px 20px; text-align: center; color: var(--text-muted); font-size: 0.85rem; font-weight: 500; letter-spacing: 0.05em; border-top: 1px solid var(--glass-border); }
    @keyframes reveal { to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 768px) { #appContainer { grid-template-columns: 1fr; } .search-section { top: 10px; } }
  </style>
</head>
<body>
  <header><h1>Kai Hub</h1></header>
  <section class="search-section"><div class="search-wrapper"><input type="text" id="searchInput" placeholder="Search for apps..." oninput="filterApps()"></div></section>
  <main><div id="appContainer"></div></main>
  <footer><p>KAI HUB • Powered by Platinum Engine.</p></footer>
  <script>
    let allApps = [];
    const formatUrl = (url, isIOS) => url && isIOS ? "itms-services://?action=download-manifest&url=" + encodeURIComponent(url) : url;
    const renderApps = (apps) => {
      const container = document.getElementById("appContainer"); container.innerHTML = "";
      if (apps.length === 0) { container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: var(--text-muted); font-weight: 500;">No apps found matching your search.</div>'; return; }
      apps.forEach((app, index) => {
        const isIOS = (app.platform || "").toLowerCase().includes("ios");
        const devUrl = formatUrl(app.downloads?.dev, isIOS);
        const prodUrl = formatUrl(app.downloads?.prod, isIOS);
        const aabUrl = app.downloads?.aab || "";
        const card = document.createElement("article"); card.className = "app-card"; card.style.animationDelay = `${index * 0.05}s`;
        card.innerHTML = `<div class="app-icon-box"><img src="${app.icon || 'https://via.placeholder.com/150'}" class="app-icon" alt="${app.name}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(app.name)}&background=475569&color=fff'"></div>
          <span class="badge ${isIOS ? 'ios' : 'android'}">${app.platform || 'Android'}</span>
          <h2 class="app-title">${app.name}</h2><p class="app-desc">${app.description || ''}</p>
          <div class="btn-grid">${devUrl ? `<a href="${devUrl}" class="btn btn-dev">DEV VERSION</a>` : ""} ${prodUrl ? `<a href="${prodUrl}" class="btn btn-live">LIVE VERSION</a>` : ""} ${aabUrl ? `<a href="${aabUrl}" class="btn btn-full">DOWNLOAD AAB</a>` : ""}</div>`;
        container.appendChild(card);
      });
    };
    const filterApps = () => {
      const query = document.getElementById("searchInput").value.toLowerCase();
      renderApps(allApps.filter(app => app.name.toLowerCase().includes(query) || (app.description && app.description.toLowerCase().includes(query))));
    };
    fetch("apps.json").then(res => res.json()).then(data => { allApps = data.apps || []; renderApps(allApps); }).catch(err => { document.getElementById("appContainer").innerHTML = '<div style="color: #ef4444; font-weight: 500; text-align: center; grid-column: 1/-1;">Connection error. Please try again later.</div>'; });
  </script>
</body>
</html>
